<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kill Feed Engine</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #0b1020;
    color: white;
    display: flex;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #111827;
    padding: 20px;
    position: fixed;
    height: 100vh;
}

.sidebar h2 {
    margin-bottom: 20px;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 8px;
    opacity: 0.8;
}

/* MAIN */
.main {
    margin-left: 220px;
    width: calc(100% - 220px);
    padding: 20px;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px;
}

header h1 {
    font-size: 2.8rem;
}

.stats {
    margin-top: 10px;
    opacity: 0.8;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    border: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #ff0000;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

/* FEED */
#feed {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* KILL ITEM */
.kill {
    padding: 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    animation: pop 0.25s ease;
    border-left: 4px solid white;
}

/* POP ANIMATION */
@keyframes pop {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* RARITY */
.rare { border-left-color: #60a5fa; }
.legendary { border-left-color: #facc15; box-shadow: 0 0 10px #facc15; }
.mythic { border-left-color: #a855f7; box-shadow: 0 0 15px #a855f7; }

/* FIRE MODE */
.fire {
    color: #ff4d4d;
    text-shadow: 0 0 10px red;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>💀 Kill Engine</h2>
    <a href="#gen">Generator</a>
</div>

<!-- MAIN -->
<div class="main">

<header>
    <h1>💀 Brutal Kill Feed Engine</h1>
    <div class="stats">
        Kills: <span id="kills">0</span> |
        Streak: <span id="streak">0</span>
    </div>
</header>

<!-- GENERATOR -->
<section id="gen">

<input id="victim" placeholder="Victim name">
<input id="killer" placeholder="Killer name (optional)">

<select id="mode">
    <option value="random">Random</option>
    <option value="normal">Normal</option>
    <option value="brutal">Brutal</option>
    <option value="execution">Execution</option>
    <option value="erasure">Erasure</option>
</select>

<button onclick="generate()">Generate Kill</button>

<div id="feed"></div>

</section>

<audio id="sound" src="https://www.soundjay.com/button/beep-07.mp3"></audio>

</div>

<script>

let kills = 0;
let streak = 0;
let lastTime = 0;

/* =========================
   BRUTAL KILL SYSTEM
========================= */

const tiers = {
normal: [
"{victim} eliminated.",
"{victim} taken down.",
"{victim} removed.",
"{victim} down."
],

brutal: [
"{victim} was completely wiped out.",
"{victim} got erased instantly.",
"{victim} ceased to exist.",
"{victim} was destroyed on impact."
],

execution: [
"{killer} executed {victim}.",
"{victim} was erased by {killer}.",
"{killer} ended {victim}'s existence.",
"{victim} got finished immediately."
],

erasure: [
"{victim} was erased from reality.",
"{victim} was removed from the system.",
"{victim} no longer exists.",
"{victim} was fully nullified."
]
};

const tags = [
"[HEADSHOT]",
"[ELIMINATION]",
"[CRITICAL]",
"[WIPE]",
"[DOWN]"
];

/* =========================
   GENERATE
========================= */

function generate() {

    const victim = document.getElementById("victim").value || "Unknown";
    const killer = document.getElementById("killer").value || "Unknown";
    const mode = document.getElementById("mode").value;

    let pool;

    if (mode === "random") {
        pool = Object.values(tiers).flat();
    } else {
        pool = tiers[mode];
    }

    let msg = pool[Math.floor(Math.random() * pool.length)];

    msg = msg.replaceAll("{victim}", victim);
    msg = msg.replaceAll("{killer}", killer);

    // add kill tag
    msg += " " + tags[Math.floor(Math.random() * tags.length)];

    // streak system
    const now = Date.now();

    if (now - lastTime < 3000) streak++;
    else streak = 1;

    lastTime = now;
    kills++;

    // rarity
    let rarity = "";
    const roll = Math.random();

    if (roll > 0.95) rarity = "mythic";
    else if (roll > 0.8) rarity = "legendary";
    else if (roll > 0.55) rarity = "rare";

    const div = document.createElement("div");
    div.className = `kill ${rarity}`;

    // FIRE MODE
    if (streak >= 5) {
        msg = "🔥 FIRE MODE | " + msg;
        div.classList.add("fire");
    }

    div.innerText = msg;

    document.getElementById("feed").prepend(div);

    document.getElementById("sound").play();

    document.getElementById("kills").innerText = kills;
    document.getElementById("streak").innerText = streak;
}

</script>

</body>
</html>
