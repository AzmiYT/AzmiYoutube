<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AzmiYT Kill Feed</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #111827;
    padding: 20px;
    position: fixed;
    height: 100vh;
    transition: 0.3s;
}

.sidebar h2 {
    margin-bottom: 20px;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 8px;
    opacity: 0.8;
}

.sidebar a:hover {
    background: #1f2937;
    opacity: 1;
}

/* MOBILE SIDEBAR */
.toggle {
    display: none;
    position: fixed;
    top: 10px;
    left: 10px;
    background: #ff0000;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    z-index: 999;
}

/* MAIN */
.main {
    margin-left: 220px;
    width: calc(100% - 220px);
    padding: 20px;
}

/* HERO */
header {
    text-align: center;
    padding: 80px 20px 40px;
}

header h1 {
    font-size: 3.5rem;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    border: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #ff0000;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #cc0000;
}

/* FEED CONTAINER */
.feed {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* KILL ITEM */
.kill {
    background: rgba(255,255,255,0.08);
    padding: 12px;
    border-radius: 10px;
    animation: pop 0.3s ease;
    border-left: 4px solid #ff0000;
}

@keyframes pop {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* RARITY COLORS */
.common { border-left-color: white; }
.rare { border-left-color: #60a5fa; }
.legendary { border-left-color: #facc15; }
.mythic { border-left-color: #a855f7; }

/* MOBILE */
@media (max-width: 700px) {
    .sidebar {
        left: -250px;
        position: fixed;
    }

    .sidebar.active {
        left: 0;
    }

    .main {
        margin-left: 0;
        width: 100%;
    }

    .toggle {
        display: block;
    }
}
</style>
</head>

<body>

<button class="toggle" onclick="toggleSidebar()">☰</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <h2>🔥 AzmiYT</h2>
    <a href="#home">Home</a>
    <a href="#generator">💀 Generator</a>
    <a href="#feed">📜 Kill Feed</a>
</div>

<!-- MAIN -->
<div class="main">

<header id="home">
    <h1>💀 Kill Feed System</h1>
    <p>Live chaotic death messages</p>
</header>

<section id="generator">
    <input id="victim" placeholder="Victim name">
    <input id="killer" placeholder="Killer name (optional)">

    <select id="mode">
        <option value="random">Random</option>
        <option value="normal">Normal</option>
        <option value="sniper">Sniper</option>
        <option value="vehicle">Vehicle</option>
    </select>

    <button onclick="generate()">Generate Kill</button>
</section>

<section class="feed" id="feed"></section>

<audio id="sound" src="https://www.soundjay.com/button/beep-07.mp3"></audio>

</div>

<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("active");
}

function generate() {
    const victim = document.getElementById("victim").value || "Someone";
    const killer = document.getElementById("killer").value;
    const mode = document.getElementById("mode").value;

    const pool = {
        normal: [
            `${victim} got destroyed.`,
            `${victim} vanished instantly.`,
            `${victim} got folded.`,
        ],
        sniper: [
            `${victim} got sniped from 40ft.`,
            `${killer} no-scoped ${victim}.`,
        ],
        vehicle: [
            `${victim} got hit by a F-22.`,
            `${killer} ran over ${victim} with a jet.`,
        ],
        random: [
            `${victim} got deleted.`,
            `${victim} got obliterated.`,
            `${killer} erased ${victim}.`
        ]
    };

    let list = pool[mode];
    const msg = list[Math.floor(Math.random() * list.length)];

    let rarity = "common";
    const roll = Math.random();

    if (roll > 0.97) rarity = "mythic";
    else if (roll > 0.85) rarity = "legendary";
    else if (roll > 0.6) rarity = "rare";

    const div = document.createElement("div");
    div.className = `kill ${rarity}`;
    div.innerText = msg;

    document.getElementById("feed").prepend(div);

    document.getElementById("sound").play();
}
</script>

</body>
</html>
